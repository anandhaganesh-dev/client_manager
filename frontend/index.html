<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Client Manager</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Freelance Client Manager</h1>

    <h2>Add Client</h2>

    <form id="client-form">

        <input type="text"
        id="name"
        placeholder="Name"
        required>

        <input type="email"
        id="email"
        placeholder="Email"
        required>
        
        <input type="text"
        id="company"
        placeholder="company"
        required>

        <button type="submit">
            Add Client
        </button>

    </form>

    <hr>

    <div id="clients-container">

    </div>

    <script src="script.js"></script>

</body>
</html>
